<!doctype html><html><head><meta charset="utf-8"><title>r</title></head><body>
<canvas id="c"></canvas>
<script type="module">
import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.296/build/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.296/build/pdf.worker.min.mjs';
const r = await fetch('../assets/aol-logo.pdf');
const buf = new Uint8Array(await r.arrayBuffer());
const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
const page = await pdf.getPage(1);
const vp = page.getViewport({ scale: 3 });
const c = document.getElementById('c');
c.width = vp.width; c.height = vp.height;
const ctx = c.getContext('2d');
ctx.fillStyle='#fff'; ctx.fillRect(0,0,vp.width,vp.height);
await page.render({ canvasContext: ctx, viewport: vp, canvas: c }).promise;
window.__dataURL = c.toDataURL('image/png');
document.title = 'done ' + vp.width + 'x' + vp.height;
</script>
</body></html>
